name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: boq
          POSTGRES_PASSWORD: boq
          POSTGRES_DB: boq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U boq -d boq_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # Tests create the schema in this throwaway DB, then roll back every test.
      TEST_DATABASE_URL: postgresql://boq:boq@localhost:5432/boq_test
      TEST_INIT_DB: "1"
      AUTH_SECRET: test-secret-not-used-in-prod-0123456789abcdef
      LLM_PROVIDER: stub
      EMBED_PROVIDER: stub
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.com
