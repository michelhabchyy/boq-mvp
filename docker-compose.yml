# PostgreSQL 17 with the pgvector extension preinstalled.
# Exposed on host port 5433 so it does NOT clash with your native PG18 (5432).
# Values come from the root .env file (POSTGRES_USER / PASSWORD / DB).

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: boq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - boq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  boq_pgdata:
